version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries"
    schema: "./migrations"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        sql_package: "pgx/v5"
        emit_prepared_queries: true
        emit_empty_slices: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            engine: "postgresql"
            go_type:
              type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            nullable: false
            engine: "postgresql"
            go_type:
              type: "time.Time"
